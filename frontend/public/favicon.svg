<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Bakgrunn -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Søyle 1: grå -->
  <rect x="15" y="63" width="18" height="22" rx="4" fill="#475569"/>

  <!-- Søyle 2: emerald -->
  <rect x="41" y="46" width="18" height="39" rx="4" fill="#10b981"/>

  <!-- Søyle 3: lys emerald -->
  <rect x="67" y="27" width="18" height="58" rx="4" fill="#34d399"/>

  <!-- Trendlinje -->
  <polyline
    points="24,63 50,46 76,27"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.45"
  />

  <!-- Prikk i toppen -->
  <circle cx="76" cy="27" r="5.5" fill="white" opacity="0.9"/>
